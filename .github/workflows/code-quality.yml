name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  lint:
    name: Flutter Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        continue-on-error: true # Formatting differences shouldn't block CI
        run: dart format --output=none --set-exit-if-changed lib/

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Check for outdated packages
        continue-on-error: true # Outdated packages are informational, not blocking
        run: flutter pub outdated
